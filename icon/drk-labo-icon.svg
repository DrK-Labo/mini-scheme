<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Exponential gradient: white center → 50% gray edge -->
    <!-- Simulating exponential curve with multiple stops clustered toward the edge -->
    <radialGradient id="discGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="30%" stop-color="#fcfcfc"/>
      <stop offset="50%" stop-color="#f5f5f5"/>
      <stop offset="65%" stop-color="#e8e8e8"/>
      <stop offset="75%" stop-color="#d4d4d4"/>
      <stop offset="82%" stop-color="#bfbfbf"/>
      <stop offset="88%" stop-color="#a8a8a8"/>
      <stop offset="93%" stop-color="#949494"/>
      <stop offset="97%" stop-color="#858585"/>
      <stop offset="100%" stop-color="#808080"/>
    </radialGradient>
  </defs>

  <!-- Transparent background -->

  <!-- Gradient disc -->
  <circle cx="256" cy="256" r="240" fill="url(#discGrad)"/>

  <!-- Large capital Lambda with serif font -->
  <text x="256" y="256" font-family="Georgia, 'Times New Roman', 'Palatino Linotype', serif"
        font-size="360" font-weight="normal" fill="#1a1a1a"
        text-anchor="middle" dominant-baseline="central">&#923;</text>

</svg>
